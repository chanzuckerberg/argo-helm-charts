# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test gateway SecurityPolicy (oidc, basicAuth, cors, ipAllowList)
templates:
  - gateway-securitypolicy.yaml
tests:
  - it: should create no SecurityPolicy when no security features are set
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a SecurityPolicy named -oidc for the primary host
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        isKind:
          of: SecurityPolicy
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1-oidc
      - documentIndex: 0
        equal:
          path: spec.targetRefs[0].name
          value: release-name-stack-service1
      - documentIndex: 0
        equal:
          path: spec.oidc.redirectURL
          value: https://api.example.com/oauth2/callback
      - documentIndex: 0
        equal:
          path: spec.oidc.clientID
          value: my-client-id
      - documentIndex: 0
        equal:
          path: spec.oidc.clientSecret.name
          value: argus-global-oidc

  - it: should create a SecurityPolicy per rule with full OIDC config
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
            authorizationEndpoint: https://auth.example.com/authorize
            tokenEndpoint: https://auth.example.com/token
          logoutPath: /logout
          forwardAccessToken: true
          cookieDomain: example.com
          scopes:
            - openid
            - profile
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1-oidc
      - documentIndex: 0
        equal:
          path: spec.oidc.provider.issuer
          value: https://auth.example.com
      - documentIndex: 0
        equal:
          path: spec.oidc.provider.authorizationEndpoint
          value: https://auth.example.com/authorize
      - documentIndex: 0
        equal:
          path: spec.oidc.clientID
          value: my-client-id
      - documentIndex: 0
        equal:
          path: spec.oidc.logoutPath
          value: /logout
      - documentIndex: 0
        equal:
          path: spec.oidc.cookieDomain
          value: example.com
      - documentIndex: 0
        contains:
          path: spec.oidc.scopes
          content: openid
      - documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-stack-service1-rule-0-oidc
      - documentIndex: 1
        equal:
          path: spec.oidc.redirectURL
          value: https://api2.example.com/oauth2/callback

  - it: should include annotations on SecurityPolicies
    set:
      global:
        ingress:
          enabled: false
        annotations:
          global-annotation: "global-value"
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          annotations:
            oidc-annotation: "oidc-value"
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.annotations["global-annotation"]
          value: "global-value"
      - documentIndex: 0
        equal:
          path: metadata.annotations["oidc-annotation"]
          value: "oidc-value"

  - it: should render basicAuth (named -security) when enabled without oidc
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          basicAuth:
            enabled: true
            secretName: my-htpasswd
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1-security
      - documentIndex: 0
        equal:
          path: spec.basicAuth.users.name
          value: my-htpasswd
      - documentIndex: 0
        notExists:
          path: spec.oidc

  - it: should render cors when enabled
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          cors:
            enabled: true
            allowOrigins:
              - https://app.example.com
            allowMethods:
              - GET
              - POST
            allowCredentials: true
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        contains:
          path: spec.cors.allowOrigins
          content: https://app.example.com
      - documentIndex: 0
        equal:
          path: spec.cors.allowCredentials
          value: true

  - it: should render an IP allowlist authorization rule
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          ipAllowList:
            - 192.112.170.192/26
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: spec.authorization.defaultAction
          value: Deny
      - documentIndex: 0
        equal:
          path: spec.authorization.rules[0].action
          value: Allow
      - documentIndex: 0
        contains:
          path: spec.authorization.rules[0].principal.clientCIDRs
          content: 192.112.170.192/26

  - it: should compose oidc with cors in a single SecurityPolicy
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          cors:
            enabled: true
            allowOrigins:
              - https://app.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        exists:
          path: spec.oidc
      - documentIndex: 0
        exists:
          path: spec.cors

  - it: should add a public SecurityPolicy for cors on the skipAuth route
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          cors:
            enabled: true
            allowOrigins:
              - https://app.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          skipAuth:
            - path: /healthz
              method: GET
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-stack-service1-public-security
      - documentIndex: 1
        notExists:
          path: spec.oidc
      - documentIndex: 1
        exists:
          path: spec.cors
