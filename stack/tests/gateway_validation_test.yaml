# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test gateway validation
templates:
  - httproute.yaml
  - gateway-oidc.yaml
  - ingress.yaml
tests:
  - it: should fail when gateway rule is missing host (non-OIDC)
    template: httproute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          rules:
            - paths:
                - path: /api
                  pathType: Prefix
      services:
        service1: {}
    asserts:
      - failedTemplate:
          errorMessage: "gateway.rules[0].host is required. Each rule must specify a host."

  - it: should fail when multiple rules are missing host
    template: httproute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          rules:
            - host: api2.example.com
            - paths:
                - path: /api
                  pathType: Prefix
            - host: api3.example.com
      services:
        service1: {}
    asserts:
      - failedTemplate:
          errorMessage: "gateway.rules[1].host is required. Each rule must specify a host."

  - it: should succeed when all rules have host
    template: httproute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          rules:
            - host: api2.example.com
            - host: api3.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 3

  - it: should fail when oidcProxyGateway.clientID is missing
    template: gateway-oidc.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
        oidcProxyGateway:
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - failedTemplate:
          errorMessage: "oidcProxyGateway.clientID is required when gateway.oidcProtected is enabled. Set it explicitly in your values.yaml."

  - it: should fail when oidcProxyGateway.provider.issuer is missing
    template: gateway-oidc.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
        oidcProxyGateway:
          clientID: my-client-id
      services:
        service1: {}
    asserts:
      - failedTemplate:
          errorMessage: "oidcProxyGateway.provider.issuer is required when gateway.oidcProtected is enabled. Set it explicitly in your values.yaml."

  - it: should fail when both gateway and ingress are enabled at global level
    template: ingress.yaml
    set:
      global:
        gateway:
          enabled: true
          host: api.example.com
        ingress:
          enabled: true
          host: api.example.com
      services:
        service1: {}
    asserts:
      - failedTemplate:
          errorMessage: "gateway.enabled and ingress.enabled cannot both be true. Please enable only one routing method: either gateway or ingress."

  - it: should auto-disable ingress when service enables gateway (global ingress enabled)
    templates:
      - httproute.yaml
      - ingress.yaml
    set:
      global:
        ingress:
          enabled: true
          host: ingress.example.com
        gateway:
          enabled: false
      services:
        service1:
          gateway:
            enabled: true
            host: gateway.example.com
    asserts:
      - template: httproute.yaml
        hasDocuments:
          count: 1
      - template: ingress.yaml
        hasDocuments:
          count: 0

  - it: should auto-disable gateway when service enables ingress (global gateway enabled)
    templates:
      - httproute.yaml
      - ingress.yaml
    set:
      global:
        gateway:
          enabled: true
          host: gateway.example.com
        ingress:
          enabled: false
      services:
        service1:
          ingress:
            enabled: true
            host: ingress.example.com
    asserts:
      - template: httproute.yaml
        hasDocuments:
          count: 0
      - template: ingress.yaml
        hasDocuments:
          count: 1

  - it: should allow different services to use different routing methods
    templates:
      - httproute.yaml
      - ingress.yaml
    set:
      global:
        ingress:
          enabled: true
          host: default.example.com
        gateway:
          enabled: false
      services:
        frontend:
          gateway:
            enabled: true
            host: frontend.example.com
        backend:
          ingress:
            enabled: true
            host: backend.example.com
    asserts:
      - template: httproute.yaml
        hasDocuments:
          count: 1
      - template: ingress.yaml
        hasDocuments:
          count: 1

  - it: should fail when service explicitly enables both gateway and ingress
    template: ingress.yaml
    set:
      global:
        gateway:
          enabled: false
        ingress:
          enabled: false
      services:
        service1:
          gateway:
            enabled: true
            host: gateway.example.com
          ingress:
            enabled: true
            host: ingress.example.com
    asserts:
      - failedTemplate:
          errorMessage: "gateway.enabled and ingress.enabled cannot both be true. Please enable only one routing method: either gateway or ingress."
