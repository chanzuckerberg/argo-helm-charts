# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test gateway TLSRoute (passthrough)
templates:
  - tlsroute.yaml
  - httproute.yaml
tests:
  - it: should not create a TLSRoute when tlsPassthrough is disabled
    template: tlsroute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a v1 TLSRoute with all hostnames when enabled
    template: tlsroute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: passthrough.example.com
          tlsPassthrough:
            enabled: true
          rules:
            - host: passthrough2.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        isKind:
          of: TLSRoute
      - documentIndex: 0
        equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: passthrough.example.com
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: passthrough2.example.com
      - documentIndex: 0
        equal:
          path: spec.parentRefs[0].name
          value: envoy-gateway
      - documentIndex: 0
        notExists:
          path: spec.parentRefs[0].sectionName
      - documentIndex: 0
        equal:
          path: spec.rules[0].backendRefs[0].name
          value: release-name-stack-service1
      - documentIndex: 0
        equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should pin sectionName when set
    template: tlsroute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: passthrough.example.com
          tlsPassthrough:
            enabled: true
            sectionName: tls-passthrough-0
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        equal:
          path: spec.parentRefs[0].sectionName
          value: tls-passthrough-0

  - it: should suppress the L7 HTTPRoute when tlsPassthrough is enabled
    template: httproute.yaml
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: passthrough.example.com
          tlsPassthrough:
            enabled: true
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0
