# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test gateway OIDC HTTPRoutes
templates:
  - gateway-oidc.yaml
tests:
  - it: should not create resources when gateway.enabled=false
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: false
          oidcProtected: true
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create resources when oidcProtected=false
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          oidcProtected: false
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should create the primary HTTPRoute (SecurityPolicy is in gateway-securitypolicy.yaml)
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        isKind:
          of: HTTPRoute
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1
      - documentIndex: 0
        equal:
          path: spec.hostnames[0]
          value: api.example.com

  - it: should create a separate HTTPRoute per rule
    set:
      global:
        fullnameOverride: myapp
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
          rules:
            - host: api2.example.com
            - host: api3.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        equal:
          path: metadata.name
          value: myapp-service1
      - documentIndex: 1
        equal:
          path: metadata.name
          value: myapp-service1-rule-0
      - documentIndex: 1
        equal:
          path: spec.hostnames[0]
          value: api2.example.com
      - documentIndex: 2
        equal:
          path: metadata.name
          value: myapp-service1-rule-1

  - it: should create public HTTPRoute for skipAuth paths with all hostnames
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          skipAuth:
            - path: /healthz
              method: GET
            - path: /metrics
              method: GET
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        isKind:
          of: HTTPRoute
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1-public
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: api.example.com
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: api2.example.com
      - documentIndex: 0
        lengthEqual:
          path: spec.rules
          count: 2
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /healthz
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].method
          value: GET
      - documentIndex: 0
        equal:
          path: spec.rules[1].matches[0].path.value
          value: /metrics

  - it: should add default root path when no root path exists
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /backend
              pathType: Prefix
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        lengthEqual:
          path: spec.rules
          count: 2
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - documentIndex: 0
        equal:
          path: spec.rules[1].matches[0].path.value
          value: /backend

  - it: should not add default root path when root path already exists
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        lengthEqual:
          path: spec.rules
          count: 1
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: should include service labels on the HTTPRoutes
    set:
      global:
        ingress:
          enabled: false
        argusMetadata:
          envName: "production"
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"
      - documentIndex: 1
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"
