# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test gateway OIDC HTTPRoute and SecurityPolicy
templates:
  - gateway-oidc.yaml
tests:
  - it: should not create resources when gateway.enabled=false
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: false
          oidcProtected: true
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create resources when oidcProtected=false
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          oidcProtected: false
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HTTPRoute and SecurityPolicy for primary host
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 2
      # HTTPRoute
      - documentIndex: 0
        isKind:
          of: HTTPRoute
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1
      - documentIndex: 0
        equal:
          path: spec.hostnames[0]
          value: api.example.com
      # SecurityPolicy
      - documentIndex: 1
        isKind:
          of: SecurityPolicy
      - documentIndex: 1
        equal:
          path: metadata.name
          value: release-name-stack-service1-oidc
      - documentIndex: 1
        equal:
          path: spec.targetRefs[0].kind
          value: HTTPRoute
      - documentIndex: 1
        equal:
          path: spec.targetRefs[0].name
          value: release-name-stack-service1
      - documentIndex: 1
        equal:
          path: spec.oidc.redirectURL
          value: https://api.example.com/oauth2/callback

  - it: should create separate HTTPRoute and SecurityPolicy per rule
    set:
      global:
        fullnameOverride: myapp
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
          rules:
            - host: api2.example.com
            - host: api3.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 6
      # Primary HTTPRoute
      - documentIndex: 0
        isKind:
          of: HTTPRoute
      - documentIndex: 0
        equal:
          path: metadata.name
          value: myapp-service1
      - documentIndex: 0
        equal:
          path: spec.hostnames[0]
          value: api.example.com
      # Rule 0 HTTPRoute
      - documentIndex: 1
        isKind:
          of: HTTPRoute
      - documentIndex: 1
        equal:
          path: metadata.name
          value: myapp-service1-rule-0
      - documentIndex: 1
        equal:
          path: spec.hostnames[0]
          value: api2.example.com
      # Rule 1 HTTPRoute
      - documentIndex: 2
        isKind:
          of: HTTPRoute
      - documentIndex: 2
        equal:
          path: metadata.name
          value: myapp-service1-rule-1
      - documentIndex: 2
        equal:
          path: spec.hostnames[0]
          value: api3.example.com
      # Primary SecurityPolicy
      - documentIndex: 3
        isKind:
          of: SecurityPolicy
      - documentIndex: 3
        equal:
          path: metadata.name
          value: myapp-service1-oidc
      - documentIndex: 3
        equal:
          path: spec.targetRefs[0].name
          value: myapp-service1
      - documentIndex: 3
        lengthEqual:
          path: spec.targetRefs
          count: 1
      - documentIndex: 3
        equal:
          path: spec.oidc.redirectURL
          value: https://api.example.com/oauth2/callback
      # Rule 0 SecurityPolicy
      - documentIndex: 4
        isKind:
          of: SecurityPolicy
      - documentIndex: 4
        equal:
          path: metadata.name
          value: myapp-service1-rule-0-oidc
      - documentIndex: 4
        equal:
          path: spec.targetRefs[0].name
          value: myapp-service1-rule-0
      - documentIndex: 4
        lengthEqual:
          path: spec.targetRefs
          count: 1
      - documentIndex: 4
        equal:
          path: spec.oidc.redirectURL
          value: https://api2.example.com/oauth2/callback
      # Rule 1 SecurityPolicy
      - documentIndex: 5
        isKind:
          of: SecurityPolicy
      - documentIndex: 5
        equal:
          path: metadata.name
          value: myapp-service1-rule-1-oidc
      - documentIndex: 5
        equal:
          path: spec.targetRefs[0].name
          value: myapp-service1-rule-1
      - documentIndex: 5
        lengthEqual:
          path: spec.targetRefs
          count: 1
      - documentIndex: 5
        equal:
          path: spec.oidc.redirectURL
          value: https://api3.example.com/oauth2/callback

  - it: should set OIDC configuration in all SecurityPolicies
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
            authorizationEndpoint: https://auth.example.com/authorize
            tokenEndpoint: https://auth.example.com/token
          logoutPath: /logout
          forwardAccessToken: true
          refreshToken: false
          cookieDomain: example.com
          cookieNames:
            accessToken: my-access-token
            idToken: my-id-token
          scopes:
            - openid
            - profile
            - email
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 4
      # Primary SecurityPolicy (HTTPRoutes 0,1 then SecurityPolicies 2,3)
      - documentIndex: 2
        equal:
          path: spec.oidc.provider.issuer
          value: https://auth.example.com
      - documentIndex: 2
        equal:
          path: spec.oidc.provider.authorizationEndpoint
          value: https://auth.example.com/authorize
      - documentIndex: 2
        equal:
          path: spec.oidc.provider.tokenEndpoint
          value: https://auth.example.com/token
      - documentIndex: 2
        equal:
          path: spec.oidc.clientID
          value: my-client-id
      - documentIndex: 2
        equal:
          path: spec.oidc.clientSecret.name
          value: release-name-stack-service1-oidc-client-secret
      - documentIndex: 2
        equal:
          path: spec.oidc.logoutPath
          value: /logout
      - documentIndex: 2
        equal:
          path: spec.oidc.forwardAccessToken
          value: true
      - documentIndex: 2
        equal:
          path: spec.oidc.cookieDomain
          value: example.com
      - documentIndex: 2
        equal:
          path: spec.oidc.cookieNames.accessToken
          value: my-access-token
      - documentIndex: 2
        equal:
          path: spec.oidc.cookieNames.idToken
          value: my-id-token
      - documentIndex: 2
        contains:
          path: spec.oidc.scopes
          content: openid
      # Rule SecurityPolicy has same OIDC config except redirectURL
      - documentIndex: 3
        equal:
          path: spec.oidc.provider.issuer
          value: https://auth.example.com
      - documentIndex: 3
        equal:
          path: spec.oidc.clientID
          value: my-client-id
      - documentIndex: 3
        equal:
          path: spec.oidc.redirectURL
          value: https://api2.example.com/oauth2/callback

  - it: should create public HTTPRoute for skipAuth paths with all hostnames
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          skipAuth:
            - path: /healthz
              method: GET
            - path: /metrics
              method: GET
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 5
      # Public HTTPRoute
      - documentIndex: 0
        isKind:
          of: HTTPRoute
      - documentIndex: 0
        equal:
          path: metadata.name
          value: release-name-stack-service1-public
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: api.example.com
      - documentIndex: 0
        contains:
          path: spec.hostnames
          content: api2.example.com
      - documentIndex: 0
        lengthEqual:
          path: spec.hostnames
          count: 2
      - documentIndex: 0
        lengthEqual:
          path: spec.rules
          count: 2
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /healthz
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].method
          value: GET
      - documentIndex: 0
        equal:
          path: spec.rules[1].matches[0].path.value
          value: /metrics

  - it: should not add default root path when root path already exists
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          paths:
            - path: /
              pathType: Prefix
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      - documentIndex: 0
        lengthEqual:
          path: spec.rules
          count: 1
      - documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: should include annotations on SecurityPolicies
    set:
      global:
        ingress:
          enabled: false
        annotations:
          global-annotation: "global-value"
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          annotations:
            oidc-annotation: "oidc-value"
      services:
        service1: {}
    asserts:
      - hasDocuments:
          count: 4
      # Primary SecurityPolicy (HTTPRoutes at 0,1 then SecurityPolicies at 2,3)
      - documentIndex: 2
        equal:
          path: metadata.annotations["global-annotation"]
          value: "global-value"
      - documentIndex: 2
        equal:
          path: metadata.annotations["oidc-annotation"]
          value: "oidc-value"
      # Rule SecurityPolicy
      - documentIndex: 3
        equal:
          path: metadata.annotations["global-annotation"]
          value: "global-value"
      - documentIndex: 3
        equal:
          path: metadata.annotations["oidc-annotation"]
          value: "oidc-value"

  - it: should support OIDC resources parameter
    set:
      global:
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
          resources:
            - resource1
            - resource2
      services:
        service1: {}
    asserts:
      - documentIndex: 1
        contains:
          path: spec.oidc.resources
          content: resource1
      - documentIndex: 1
        contains:
          path: spec.oidc.resources
          content: resource2

  - it: should include service labels on all resources
    set:
      global:
        ingress:
          enabled: false
        argusMetadata:
          envName: "production"
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      # All HTTPRoutes
      - documentIndex: 0
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"
      - documentIndex: 1
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"
      # All SecurityPolicies
      - documentIndex: 2
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"
      - documentIndex: 3
        equal:
          path: metadata.labels["argus/env-name"]
          value: "production"

  - it: should reference same client secret for all SecurityPolicies
    set:
      global:
        fullnameOverride: myapp
        ingress:
          enabled: false
        gateway:
          enabled: true
          host: api.example.com
          oidcProtected: true
          rules:
            - host: api2.example.com
        oidcProxyGateway:
          clientID: my-client-id
          provider:
            issuer: https://auth.example.com
      services:
        service1: {}
    asserts:
      # Primary SecurityPolicy
      - documentIndex: 2
        equal:
          path: spec.oidc.clientSecret.name
          value: myapp-service1-oidc-client-secret
      # Rule SecurityPolicy
      - documentIndex: 3
        equal:
          path: spec.oidc.clientSecret.name
          value: myapp-service1-oidc-client-secret
