# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test KEDA ScaledObject
templates:
  - scaled-object.yaml
tests:
  - it: should not create a ScaledObject when kedaAutoscaling is disabled
    set:
      services:
        service1:
          kedaAutoscaling:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create a ScaledObject when kedaAutoscaling is enabled
    set:
      services:
        service1:
          autoscaling:
            enabled: false
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 10
            pollingInterval: 30
            cooldownPeriod: 300
            triggers:
              - type: prometheus
                metadata:
                  serverAddress: http://loki-stack-prometheus-server.loki.svc
                  query: avg(bhp_inference_batch_size{model_name="esmc-tiny-dev"})
                  threshold: "0.8"
    asserts:
      - containsDocument:
          apiVersion: keda.sh/v1alpha1
          kind: ScaledObject
      - equal:
          path: spec.minReplicaCount
          value: 1
      - equal:
          path: spec.maxReplicaCount
          value: 10
      - equal:
          path: spec.pollingInterval
          value: 30
      - equal:
          path: spec.cooldownPeriod
          value: 300
      - equal:
          path: spec.triggers[0].type
          value: prometheus
      - equal:
          path: spec.triggers[0].metadata.threshold
          value: "0.8"

  - it: should set scaleTargetRef name to the service fullname
    set:
      services:
        service1:
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 5
            pollingInterval: 15
            cooldownPeriod: 60
            triggers:
              - type: cpu
                metadata:
                  type: Utilization
                  value: "80"
    asserts:
      - matchRegex:
          path: spec.scaleTargetRef.name
          pattern: ".*service1$"

  - it: should include advanced configuration when provided
    set:
      services:
        service1:
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 10
            pollingInterval: 30
            cooldownPeriod: 300
            triggers:
              - type: prometheus
                metadata:
                  serverAddress: http://prometheus.svc
                  query: some_metric
                  threshold: "5"
            advanced:
              restoreToOriginalReplicaCount: true
              horizontalPodAutoscalerConfig:
                behavior:
                  scaleDown:
                    stabilizationWindowSeconds: 300
    asserts:
      - equal:
          path: spec.advanced.restoreToOriginalReplicaCount
          value: true
      - equal:
          path: spec.advanced.horizontalPodAutoscalerConfig.behavior.scaleDown.stabilizationWindowSeconds
          value: 300

  - it: should not include advanced section when not provided
    set:
      services:
        service1:
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 5
            pollingInterval: 30
            cooldownPeriod: 300
            triggers:
              - type: cpu
                metadata:
                  type: Utilization
                  value: "80"
    asserts:
      - notExists:
          path: spec.advanced

  - it: should support multiple triggers
    set:
      services:
        service1:
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 20
            pollingInterval: 15
            cooldownPeriod: 120
            triggers:
              - type: prometheus
                metadata:
                  serverAddress: http://prometheus.svc
                  query: metric_a
                  threshold: "10"
              - type: prometheus
                metadata:
                  serverAddress: http://prometheus.svc
                  query: metric_b
                  threshold: "5"
    asserts:
      - lengthEqual:
          path: spec.triggers
          count: 2
      - equal:
          path: spec.triggers[1].metadata.query
          value: metric_b

  - it: should include argus/env-name label when argusMetadata.envName is set
    set:
      global:
        argusMetadata:
          envName: "staging"
      services:
        service1:
          kedaAutoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 5
            pollingInterval: 30
            cooldownPeriod: 300
            triggers:
              - type: cpu
                metadata:
                  type: Utilization
                  value: "80"
    asserts:
      - equal:
          path: metadata.labels["argus/env-name"]
          value: "staging"
