suite: test gateway OIDC client secret sourcing and non-root paths
templates:
  - gateway-oidc.yaml
  - gateway-securitypolicy.yaml
  - gateway-oidc-secret.yaml
tests:
  - it: should add the auto / route when the only OIDC path is non-root
    set:
      global:
        ingress:
          enabled: false
        gateway:
          host: web.example.com
        appSecrets:
          clusterCLISecret:
            secretKey: /argus/test
            secretName: test-secret
      services:
        web:
          gateway:
            enabled: true
            oidcProtected: true
            paths:
              - path: /api
                pathType: Prefix
          oidcProxyGateway:
            clientID: test-client
            provider:
              issuer: https://czi.okta.com
    asserts:
      - template: gateway-oidc.yaml
        documentIndex: 0
        equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - template: gateway-oidc.yaml
        documentIndex: 0
        equal:
          path: spec.rules[1].matches[0].path.value
          value: /api

  - it: should use clientSecretRef and skip the per-stack ExternalSecret
    set:
      global:
        ingress:
          enabled: false
        gateway:
          host: web.example.com
        appSecrets:
          clusterCLISecret:
            secretKey: /argus/test
            secretName: test-secret
      services:
        web:
          gateway:
            enabled: true
            oidcProtected: true
            paths:
              - path: /
                pathType: Prefix
          oidcProxyGateway:
            clientID: test-client
            provider:
              issuer: https://czi.okta.com
            clientSecretRef:
              name: shared-oidc-client
              namespace: platform-oidc
    asserts:
      - template: gateway-securitypolicy.yaml
        documentIndex: 0
        equal:
          path: spec.oidc.clientSecret.name
          value: shared-oidc-client
      - template: gateway-securitypolicy.yaml
        documentIndex: 0
        equal:
          path: spec.oidc.clientSecret.namespace
          value: platform-oidc
      - template: gateway-oidc-secret.yaml
        hasDocuments:
          count: 0

  - it: should derive the per-stack ExternalSecret when clientSecretRef is not set
    set:
      global:
        ingress:
          enabled: false
        gateway:
          host: web.example.com
        appSecrets:
          clusterCLISecret:
            secretKey: /argus/test
            secretName: test-secret
      services:
        web:
          gateway:
            enabled: true
            oidcProtected: true
            paths:
              - path: /
                pathType: Prefix
          oidcProxyGateway:
            clientID: test-client
            provider:
              issuer: https://czi.okta.com
    asserts:
      - template: gateway-oidc-secret.yaml
        hasDocuments:
          count: 1
      - template: gateway-securitypolicy.yaml
        documentIndex: 0
        matchRegex:
          path: spec.oidc.clientSecret.name
          pattern: -oidc-client-secret$

  - it: should source clientID and issuer from global oidcProxyGateway
    set:
      global:
        ingress:
          enabled: false
        gateway:
          host: web.example.com
        appSecrets:
          clusterCLISecret:
            secretKey: /argus/test
            secretName: test-secret
        oidcProxyGateway:
          clientID: central-client
          provider:
            issuer: https://central.okta.com
      services:
        web:
          gateway:
            enabled: true
            oidcProtected: true
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - template: gateway-securitypolicy.yaml
        documentIndex: 0
        equal:
          path: spec.oidc.clientID
          value: central-client
      - template: gateway-securitypolicy.yaml
        documentIndex: 0
        equal:
          path: spec.oidc.provider.issuer
          value: https://central.okta.com
