{{- $global := . -}}
{{ range $serviceName, $serviceValues := .Values.services }}
  {{- $globalValuesDict := $global.Values.global | toYaml -}}
  {{- $values := fromYaml $globalValuesDict -}}
  {{- $values = set $values "name" $serviceName -}}
  {{- $values := mergeOverwrite $values $serviceValues -}}
  {{- $service := dict "Chart" $global.Chart "Release" $global.Release "Capabilities" $global.Capabilities "Values" $values -}}
{{- with $service }}

{{- if and .Values.gateway.enabled .Values.gateway.oidcProtected -}}
{{- /* Create ExternalSecret to remap OAUTH2_PROXY_CLIENT_SECRET to client-secret */ -}}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "service.fullname" . }}-oidc-client-secret
  labels:
    {{- include "service.labels" . | nindent 4 }}
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: {{ include "service.fullname" . }}-oidc-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        {{- if and .Values.appSecrets.clusterCLISecret .Values.appSecrets.clusterCLISecret.secretKey }}
        key: {{ .Values.appSecrets.clusterCLISecret.secretKey }}
        {{- else if and .Values.appSecrets.clusterSecret .Values.appSecrets.clusterSecret.secretKey }}
        key: {{ .Values.appSecrets.clusterSecret.secretKey }}
        {{- else if and .Values.appSecrets.stackSecret .Values.appSecrets.stackSecret.secretKey }}
        key: {{ .Values.appSecrets.stackSecret.secretKey }}
        {{- else if and .Values.appSecrets.envSecret .Values.appSecrets.envSecret.secretKey }}
        key: {{ .Values.appSecrets.envSecret.secretKey }}
        {{- else }}
          {{- fail "No appSecret configured with secretKey for OIDC client secret. Ensure appSecrets.clusterCLISecret.secretKey (or similar) is set by Argus." }}
        {{- end }}
        property: OAUTH2_PROXY_CLIENT_SECRET
{{ end }}
{{- end }}
{{- end }}
