{{- $global := . }}
{{- $globalValues := dict "Chart" $global.Chart "Release" $global.Release "Capabilities" $global.Capabilities "Values" $global.Values.global }}
{{- with $globalValues }}
{{- if and .Values.grafanaDashboard .Values.grafanaDashboard.enabled .Values.argusMetadata .Values.argusMetadata.stackName .Values.argusMetadata.appName .Values.argusMetadata.envName }}
{{- $rootFolderName := printf "argus-folder-%s" .Values.argusMetadata.stackName }}
{{- $rootFolderTitle := "Argus" }}
{{- $appFolderName := printf "app-folder-%s" .Values.argusMetadata.stackName }}
{{- $appFolderTitle := .Values.argusMetadata.appName -}}
{{- $envFolderName := printf "env-folder-%s" .Values.argusMetadata.stackName }}
{{- $envFolderTitle := .Values.argusMetadata.envName -}}
{{- $rootFolderUid := $rootFolderTitle | lower -}}
{{- $appFolderUid := $appFolderTitle | lower -}}
{{- if gt (len $appFolderUid) 40 }}{{ $appFolderUid = $appFolderUid | sha256sum | trunc 40 }}{{ end -}}
{{- $envFolderUid := printf "%s-%s" $appFolderTitle $envFolderTitle | lower -}}
{{- if gt (len $envFolderUid) 40 }}{{ $envFolderUid = $envFolderUid | sha256sum | trunc 40 }}{{ end -}}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ $rootFolderName }}
  annotations:
    grafana.integreatly.org/preserve-resources-on-deletion: "true"
spec:
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  instanceSelector:
    {{- toYaml .Values.grafanaDashboard.instanceSelector | nindent 4 }}
  title: {{ $rootFolderTitle }}
  uid: {{ $rootFolderUid }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ $appFolderName }}
  annotations:
    grafana.integreatly.org/preserve-resources-on-deletion: "true"
spec:
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  instanceSelector:
    {{- toYaml .Values.grafanaDashboard.instanceSelector | nindent 4 }}
  parentFolderUID: {{ $rootFolderUid }}
  title: {{ $appFolderTitle }}
  uid: {{ $appFolderUid }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: {{ $envFolderName }}
  annotations:
    grafana.integreatly.org/preserve-resources-on-deletion: "true"
spec:
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  instanceSelector:
    {{- toYaml .Values.grafanaDashboard.instanceSelector | nindent 4 }}
  parentFolderUID: {{ $appFolderUid }}
  title: {{ $envFolderTitle }}
  uid: {{ $envFolderUid }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ include "stack.fullname" . | lower }}-dashboard
spec:
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  instanceSelector:
    {{- toYaml .Values.grafanaDashboard.instanceSelector | nindent 4 }}
  folderUID: {{ $envFolderUid }}
  json: |
    {{- include "stack.grafanaDashboard.json" $global | nindent 4 }}
{{- end }}
{{- end }}
