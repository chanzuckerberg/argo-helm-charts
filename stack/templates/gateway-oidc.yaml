{{- $global := . -}}
{{ range $serviceName, $serviceValues := .Values.services }}
  {{- $globalValuesDict := $global.Values.global | toYaml -}}
  {{- $values := fromYaml $globalValuesDict -}}
  {{- $values = set $values "name" $serviceName -}}
  {{- $values := mergeOverwrite $values $serviceValues -}}

  {{/* Auto-enable gateway when config keys are provided (unless explicitly disabled) */}}
  {{- if hasKey $serviceValues "gateway" -}}
    {{- $hasGatewayKeys := include "gateway.hasConfigKeys" (dict "Values" (dict "gateway" ($serviceValues.gateway | default dict))) -}}
    {{- if and $hasGatewayKeys (not (and (hasKey $serviceValues.gateway "enabled") (eq $serviceValues.gateway.enabled false))) -}}
      {{- $_ := set $values.gateway "enabled" true -}}
      {{- if not (or (and (hasKey $serviceValues "ingress") (hasKey $serviceValues.ingress "enabled") $serviceValues.ingress.enabled) (hasKey $serviceValues.gateway "dnsOwner")) -}}
        {{- $_ := set $values "ingress" (mergeOverwrite (default dict $values.ingress) (dict "enabled" false)) -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}

  {{/* Auto-disable ingress when gateway is explicitly enabled at service level */}}
  {{- if and (hasKey $serviceValues "gateway") (hasKey $serviceValues.gateway "enabled") $serviceValues.gateway.enabled -}}
    {{- if not (and (hasKey $serviceValues "ingress") (hasKey $serviceValues.ingress "enabled")) -}}
      {{- $_ := set $values "ingress" (mergeOverwrite (default dict $values.ingress) (dict "enabled" false)) -}}
    {{- end -}}
  {{- end -}}

  {{/* Auto-disable gateway when ingress is explicitly enabled at service level */}}
  {{- if and (hasKey $serviceValues "ingress") (hasKey $serviceValues.ingress "enabled") $serviceValues.ingress.enabled -}}
    {{- if not (and (hasKey $serviceValues "gateway") (or (hasKey $serviceValues.gateway "enabled") (hasKey $serviceValues.gateway "dnsOwner"))) -}}
      {{- $_ := set $values "gateway" (mergeOverwrite (default dict $values.gateway) (dict "enabled" false)) -}}
    {{- end -}}
  {{- end -}}

  {{- $service := dict "Chart" $global.Chart "Release" $global.Release "Capabilities" $global.Capabilities "Values" $values -}}
{{- with $service }}
{{- include "validate.gatewayIngressCoexistence" . -}}
{{- include "validate.gatewayRuleHost" . -}}

{{- if and .Values.gateway.enabled .Values.gateway.oidcProtected (not .Values.gateway.tlsPassthrough.enabled) -}}
{{- $filters := include "gateway.ruleFiltersInner" $service | trim -}}
{{- $timeouts := include "gateway.ruleTimeoutsInner" $service | trim -}}
{{- /* Create public HTTPRoute for skipAuth paths if configured */ -}}
{{- if gt (len ((.Values.oidcProxyGateway | default dict).skipAuth | default list)) 0 -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "service.fullname" .  }}-public
  labels:
    {{- include "service.labels" . | nindent 4 }}
  annotations:
    {{- with (mergeOverwrite
                (dict)
                (.Values.annotations)
                (.Values.gateway.annotations)
                (dict "external-dns.alpha.kubernetes.io/exclude" "true")
      ) }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gateway.vanity.enabled }}
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: {{ include "service.vanityListenerSetName" . }}
    {{- else }}
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      {{- if .Values.gateway.sectionName }}
      sectionName: {{ .Values.gateway.sectionName }}
      {{- end }}
    {{- end }}
  hostnames:
    - {{ .Values.gateway.host }}
  {{- range $i, $rule := .Values.gateway.rules }}
    - {{ $rule.host }}
  {{- end }}
  rules:
    {{- range (.Values.oidcProxyGateway | default dict).skipAuth }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
          {{- if and .method (ne .method "*") }}
          method: {{ .method }}
          {{- end }}
      backendRefs:
        - name: {{ include "service.fullname" $service }}
          port: {{ $service.Values.service.port | int }}
    {{- end }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "service.fullname" .  }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
  annotations:
    {{- with (mergeOverwrite
                (dict)
                (.Values.annotations)
                (.Values.gateway.annotations)
                (fromYaml (include "gateway.coexistDnsAnnotations" (dict "root" . "host" .Values.gateway.host) | default "{}"))
      ) }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gateway.vanity.enabled }}
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: {{ include "service.vanityListenerSetName" . }}
    {{- else }}
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
      {{- if .Values.gateway.sectionName }}
      sectionName: {{ .Values.gateway.sectionName }}
      {{- end }}
    {{- end }}
  hostnames:
    - {{ .Values.gateway.host }}
  rules:
    {{- /* When OIDC is enabled, ensure we have a route that covers /oauth2/callback */ -}}
    {{- $hasRootPath := false -}}
    {{- range $service.Values.gateway.paths -}}
      {{- if and (eq .path "/") (ne .pathType "Exact") -}}
        {{- $hasRootPath = true -}}
      {{- end -}}
    {{- end -}}
    {{- if not $hasRootPath }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "service.fullname" $service }}
          port: {{ $service.Values.service.port | int }}
    {{- end }}
    {{- range $service.Values.gateway.paths }}
    - matches:
        - path:
            {{- if eq .pathType "Exact" }}
            type: Exact
            {{- else }}
            type: PathPrefix
            {{- end }}
            value: {{ .path }}
      backendRefs:
        - name: {{ include "service.fullname" $service }}
          port: {{ $service.Values.service.port | int }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
      {{- if $filters }}
      filters:
        {{- $filters | nindent 8 }}
      {{- end }}
      {{- if $timeouts }}
      timeouts:
        {{- $timeouts | nindent 8 }}
      {{- end }}
    {{- end }}
{{- range $i, $rule := .Values.gateway.rules }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "service.fullname" $service }}-rule-{{ $i }}
  labels:
    {{- include "service.labels" $service | nindent 4 }}
  annotations:
    {{- with (mergeOverwrite
                (dict)
                ($service.Values.annotations)
                ($service.Values.gateway.annotations)
                (fromYaml (include "gateway.coexistDnsAnnotations" (dict "root" $service "host" $rule.host) | default "{}"))
      ) }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if and $rule.vanity $rule.vanity.enabled }}
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: {{ printf "%s-rule-%d" (include "service.vanityListenerSetName" $service) $i }}
    {{- else }}
    - name: {{ $service.Values.gateway.gatewayName }}
      namespace: {{ $service.Values.gateway.gatewayNamespace }}
      {{- if $service.Values.gateway.sectionName }}
      sectionName: {{ $service.Values.gateway.sectionName }}
      {{- end }}
    {{- end }}
  hostnames:
    - {{ $rule.host }}
  rules:
    {{- /* When OIDC is enabled, ensure we have a route that covers /oauth2/callback */ -}}
    {{- $hasRootPath := false -}}
    {{- $ruleValues := mergeOverwrite (dict "paths" $service.Values.gateway.paths) $rule -}}
    {{- range $ruleValues.paths -}}
      {{- if and (eq .path "/") (ne .pathType "Exact") -}}
        {{- $hasRootPath = true -}}
      {{- end -}}
    {{- end -}}
    {{- if not $hasRootPath }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "service.fullname" $service }}
          port: {{ $service.Values.service.port | int }}
    {{- end }}
    {{- range $ruleValues.paths }}
    - matches:
        - path:
            {{- if eq .pathType "Exact" }}
            type: Exact
            {{- else }}
            type: PathPrefix
            {{- end }}
            value: {{ .path }}
      backendRefs:
        - name: {{ include "service.fullname" $service }}
          port: {{ $service.Values.service.port | int }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
      {{- if $filters }}
      filters:
        {{- $filters | nindent 8 }}
      {{- end }}
      {{- if $timeouts }}
      timeouts:
        {{- $timeouts | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{ end }}
{{- end }}
