clusterName: ""
baseDomain: "dev.czi.team"
gatewayName: "envoy-gateway"
alternateNames: []

geoip:
  enabled: true
  s3:
    # S3 bucket path to GeoIP database
    bucketPath: "s3://argus-maxminddb/GeoLite2-Country.mmdb"
    # Database file name
    dbFileName: "GeoLite2-Country.mmdb"
    # IAM role ARN for S3 access (annotated on service account)
    iamRoleArn: ""
    # AWS CLI image to use for downloading from S3
    awsCliImage: "533267185808.dkr.ecr.us-west-2.amazonaws.com/docker.io/central/amazon/aws-cli:2.31.28"
  blockedCountries:
    - "AF"
    - "BY"
    - "BF"
    - "CF"
    - "CN"
    - "CU"
    - "ER"
    - "PS"
    - "HT"
    - "HK"
    - "IR"
    - "KZ"
    - "KG"
    - "LY"
    - "ML"
    - "MM"
    - "KP"
    - "RU"
    - "SD"
    - "SS"
    - "SY"
    - "SO"
    - "TJ"
    - "UA"
    - "VE"
    - "YE"

  # HTTP status code to return for blocked requests
  blockedStatusCode: 451
  blockedResponseBody: "Access from your country is not permitted"
