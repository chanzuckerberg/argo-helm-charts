suite: test envoyproxy.yaml
templates:
  - envoyproxy.yaml

tests:
  - it: should render EnvoyProxy regardless of geoip.enabled
    set:
      geoip.enabled: false
      gatewayName: test-gateway
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: EnvoyProxy
      - equal:
          path: apiVersion
          value: gateway.envoyproxy.io/v1alpha1
      - equal:
          path: metadata.name
          value: test-gateway-proxy
      - equal:
          path: metadata.namespace
          value: envoy-gateway

  - it: should default envoyService.type to ClusterIP
    set:
      geoip.enabled: false
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.type
          value: ClusterIP

  - it: should default envoyService.type to ClusterIP when geoip is enabled too
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.type
          value: ClusterIP

  - it: should honor envoyService.type override
    set:
      geoip.enabled: false
      envoyService.type: LoadBalancer
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.type
          value: LoadBalancer

  - it: should omit envoyDeployment patch when geoip is disabled
    set:
      geoip.enabled: false
    asserts:
      - notExists:
          path: spec.provider.kubernetes.envoyDeployment.patch

  - it: should set proxy container resource requests and limits from values
    set:
      geoip.enabled: false
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.requests.cpu
          value: 250m
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.limits.cpu
          value: "1"
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.limits.memory
          value: 1Gi

  - it: should enable envoyHpa with min 3 and max 20 by default
    set:
      geoip.enabled: false
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyHpa.minReplicas
          value: 3
      - equal:
          path: spec.provider.kubernetes.envoyHpa.maxReplicas
          value: 20
      - equal:
          path: spec.provider.kubernetes.envoyHpa.metrics[0].type
          value: Resource
      - equal:
          path: spec.provider.kubernetes.envoyHpa.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.provider.kubernetes.envoyHpa.metrics[0].resource.target.averageUtilization
          value: 70

  - it: should honor autoscaling min/max overrides
    set:
      geoip.enabled: false
      autoscaling.minReplicas: 2
      autoscaling.maxReplicas: 10
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyHpa.minReplicas
          value: 2
      - equal:
          path: spec.provider.kubernetes.envoyHpa.maxReplicas
          value: 10

  - it: should omit envoyHpa when autoscaling is disabled
    set:
      geoip.enabled: false
      autoscaling.enabled: false
    asserts:
      - notExists:
          path: spec.provider.kubernetes.envoyHpa

  - it: should render both HPA and resources when geoip is enabled too
    set:
      geoip.enabled: true
    asserts:
      - exists:
          path: spec.provider.kubernetes.envoyHpa
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.requests.cpu
          value: 250m
      - exists:
          path: spec.provider.kubernetes.envoyDeployment.patch

  - it: should always set prometheus scrape annotations on the proxy pods
    set:
      geoip.enabled: false
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.pod.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.pod.annotations["prometheus.io/port"]
          value: "19001"
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.pod.annotations["prometheus.io/path"]
          value: /stats/prometheus

  - it: should always set prometheus scrape annotations on the proxy service
    set:
      geoip.enabled: false
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.provider.kubernetes.envoyService.annotations["prometheus.io/port"]
          value: "19001"
      - equal:
          path: spec.provider.kubernetes.envoyService.annotations["prometheus.io/path"]
          value: /stats/prometheus

  - it: should set prometheus scrape annotations on the proxy service when geoip is enabled too
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.annotations["prometheus.io/scrape"]
          value: "true"

  # Basic EnvoyProxy resource tests when geoip enabled
  - it: should render EnvoyProxy when geoip.enabled is true
    set:
      geoip.enabled: true
      gatewayName: test-gateway
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: EnvoyProxy
      - equal:
          path: apiVersion
          value: gateway.envoyproxy.io/v1alpha1
      - equal:
          path: metadata.name
          value: test-gateway-proxy
      - equal:
          path: metadata.namespace
          value: envoy-gateway

  - it: should use Kubernetes provider type
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.type
          value: Kubernetes

  - it: should use StrategicMerge patch type when geoip enabled
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.type
          value: StrategicMerge

  # Init container tests
  - it: should have init container for GeoIP database download
    set:
      geoip.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].name
          value: geoip-db-downloader

  - it: should use correct AWS CLI image for init container
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].image
          value: 533267185808.dkr.ecr.us-west-2.amazonaws.com/docker.io/central/amazon/aws-cli:2.31.28

  - it: should use sh command in init container
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].command[0]
          value: sh
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].command[1]
          value: -c

  - it: should download from correct S3 path
    set:
      geoip.enabled: true
    asserts:
      - matchRegex:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].command[2]
          pattern: 's3://argus-maxminddb/GeoLite2-Country.mmdb'

  - it: should create directory in init container
    set:
      geoip.enabled: true
    asserts:
      - matchRegex:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].command[2]
          pattern: 'mkdir -p /etc/envoy/geoip'

  - it: should mount geoip-db volume in init container
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].volumeMounts[0].name
          value: geoip-db
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].volumeMounts[0].mountPath
          value: /etc/envoy/geoip

  # Envoy container volume mount tests
  - it: should add volume mount to envoy container
    set:
      geoip.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].name
          value: envoy

  - it: should mount geoip-db volume in envoy container at correct path
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].volumeMounts[0].name
          value: geoip-db
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/envoy/geoip

  - it: should mount geoip-db volume as readOnly in envoy container
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].volumeMounts[0].readOnly
          value: true

  # Volume tests
  - it: should define geoip-db volume
    set:
      geoip.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.volumes
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.volumes[0].name
          value: geoip-db

  - it: should use emptyDir volume type for geoip-db
    set:
      geoip.enabled: true
    asserts:
      - exists:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.volumes[0].emptyDir

  # Integration test - verify all components together
  - it: should have consistent volume naming across init container, envoy container, and volume definition
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].volumeMounts[0].name
          value: geoip-db
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].volumeMounts[0].name
          value: geoip-db
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.volumes[0].name
          value: geoip-db

  - it: should have consistent mount path across init container and envoy container
    set:
      geoip.enabled: true
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.initContainers[0].volumeMounts[0].mountPath
          value: /etc/envoy/geoip
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.patch.value.spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /etc/envoy/geoip
