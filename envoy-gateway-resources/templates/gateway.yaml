apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gatewayName }}
  namespace: envoy-gateway
  annotations:
    external-dns.alpha.kubernetes.io/target: access-gw.{{ .Values.baseDomain }}
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ .Values.gatewayName }}-proxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.baseDomain }}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: {{ .Values.gatewayName }}-tls
    {{- range .Values.additionalListeners }}
    - name: https-{{ .name }}
      protocol: HTTPS
      port: 443
      hostname: {{ .hostname | quote }}
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            kind: Secret
            name: {{ $.Values.gatewayName }}-{{ .name }}-tls
    {{- end }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-eg
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: infra-eng@chanzuckerberg.com
    privateKeySecretRef:
      name: letsencrypt-prod-eg-acme-account
    solvers:
      - selector:
          dnsZones:
            - "{{ .Values.baseDomain }}"
            {{- range .Values.additionalListeners }}
            {{- if not .route53Role }}
            - {{ trimPrefix "*." .hostname | quote }}
            {{- end }}
            {{- end }}
        dns01:
          route53:
            region: {{ .Values.awsRegion }}
      {{- range .Values.additionalListeners }}
      {{- if .route53Role }}
      - selector:
          dnsZones:
            - {{ trimPrefix "*." .hostname | quote }}
        dns01:
          route53:
            region: {{ $.Values.awsRegion }}
            role: {{ .route53Role | quote }}
      {{- end }}
      {{- end }}
      - selector: {}
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                name: {{ .Values.gatewayName }}
                namespace: envoy-gateway
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gatewayName }}-wildcard-cert
  namespace: envoy-gateway
spec:
  commonName: "*.{{ .Values.baseDomain }}"
  dnsNames:
    - "*.{{ .Values.baseDomain }}"
    - "{{ .Values.baseDomain }}"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod-eg
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
  secretName: {{ .Values.gatewayName }}-tls
  usages:
    - digital signature
    - key encipherment
{{- range .Values.additionalListeners }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $.Values.gatewayName }}-{{ .name }}-cert
  namespace: envoy-gateway
spec:
  commonName: {{ .hostname | quote }}
  dnsNames:
    - {{ .hostname | quote }}
    {{- if hasPrefix "*." .hostname }}
    - {{ trimPrefix "*." .hostname | quote }}
    {{- end }}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod-eg
  privateKey:
    algorithm: RSA
    size: 4096
  secretName: {{ $.Values.gatewayName }}-{{ .name }}-tls
  usages:
    - digital signature
    - key encipherment
{{- end }}
