{{- if .Values.geoip.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.gatewayName }}-proxy
  namespace: envoy-gateway
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyServiceAccount:
        name: {{ .Values.serviceAccount.name }}
      envoyDeployment:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  # Init container to download GeoIP database from S3
                  initContainers:
                  - name: geoip-db-downloader
                    image: 533267185808.dkr.ecr.us-west-2.amazonaws.com/docker.io/central/amazon/aws-cli:2.31.28
                    command:
                    - sh
                    - -c
                    - |
                      set -e
                      mkdir -p /etc/envoy/geoip
                      aws s3 cp s3://argus-maxminddb/GeoLite2-Country.mmdb /etc/envoy/geoip/GeoLite2-Country.mmdb
                    volumeMounts:
                    - name: geoip-db
                      mountPath: /etc/envoy/geoip

                  # Add volume mount to Envoy container
                  containers:
                  - name: envoy
                    volumeMounts:
                    - name: geoip-db
                      mountPath: /etc/envoy/geoip
                      readOnly: true

                  # Shared emptyDir volume for GeoIP database
                  volumes:
                  - name: geoip-db
                    emptyDir: {}
{{- end }}
