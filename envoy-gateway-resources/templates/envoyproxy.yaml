{{- if .Values.geoip.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ .Values.gatewayName }}-proxy
  namespace: envoy-gateway
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
{{- if .Values.geoip.s3.iamRoleArn }}
                  serviceAccountName: {{ .Values.gatewayName }}-envoy
{{- end }}
                  # Init container to download GeoIP database from S3
                  initContainers:
                  - name: geoip-db-downloader
                    image: {{ .Values.geoip.s3.awsCliImage }}
                    command:
                    - sh
                    - -c
                    - |
                      set -e
                      mkdir -p /etc/envoy/geoip
                      aws s3 cp {{ .Values.geoip.s3.bucketPath }} /etc/envoy/geoip/{{ .Values.geoip.s3.dbFileName }}
                    volumeMounts:
                    - name: geoip-db
                      mountPath: /etc/envoy/geoip

                  # Add volume mount to Envoy container
                  containers:
                  - name: envoy
                    volumeMounts:
                    - name: geoip-db
                      mountPath: /etc/envoy/geoip
                      readOnly: true

                  # Shared emptyDir volume for GeoIP database
                  volumes:
                  - name: geoip-db
                    emptyDir: {}
{{- end }}
