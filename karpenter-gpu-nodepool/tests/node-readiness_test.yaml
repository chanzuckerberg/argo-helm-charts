# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test node-readiness
templates:
  - node-readiness.yaml

tests:
  - it: should create 4 resources when enabled
    asserts:
      - hasDocuments:
          count: 4

  - it: should not create resources when disabled
    set:
      nodeReadiness:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceAccount as first document
    asserts:
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: nvidia-gpu-node-ready
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: kube-system
      - documentIndex: 0
        equal:
          path: automountServiceAccountToken
          value: true

  - it: should create ClusterRole as second document with node permissions
    asserts:
      - documentIndex: 1
        isKind:
          of: ClusterRole
      - documentIndex: 1
        equal:
          path: metadata.name
          value: nvidia-gpu-node-ready
      - documentIndex: 1
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "patch"]

  - it: should create ClusterRoleBinding as third document
    asserts:
      - documentIndex: 2
        isKind:
          of: ClusterRoleBinding
      - documentIndex: 2
        equal:
          path: metadata.name
          value: nvidia-gpu-node-ready
      - documentIndex: 2
        equal:
          path: subjects[0].kind
          value: ServiceAccount
      - documentIndex: 2
        equal:
          path: subjects[0].name
          value: nvidia-gpu-node-ready
      - documentIndex: 2
        equal:
          path: subjects[0].namespace
          value: kube-system
      - documentIndex: 2
        equal:
          path: roleRef.kind
          value: ClusterRole
      - documentIndex: 2
        equal:
          path: roleRef.name
          value: nvidia-gpu-node-ready

  - it: should create DaemonSet as fourth document
    asserts:
      - documentIndex: 3
        isKind:
          of: DaemonSet
      - documentIndex: 3
        equal:
          path: metadata.name
          value: nvidia-gpu-node-ready
      - documentIndex: 3
        equal:
          path: metadata.namespace
          value: kube-system

  - it: should use correct image
    asserts:
      - documentIndex: 3
        equal:
          path: spec.template.spec.containers[0].image
          value: registry.k8s.io/kubectl:v1.33.0

  - it: should not run as privileged
    asserts:
      - documentIndex: 3
        isNull:
          path: spec.template.spec.containers[0].securityContext

  - it: should inherit nvidiaDriver tolerations including wildcard
    asserts:
      - documentIndex: 3
        contains:
          path: spec.template.spec.tolerations
          content:
            operator: "Exists"
      - documentIndex: 3
        contains:
          path: spec.template.spec.tolerations
          content:
            key: "workload.gpu"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"

  - it: should have no tolerations when nvidiaDriver.tolerations is empty
    set:
      nvidiaDriver:
        tolerations: []
    asserts:
      - documentIndex: 3
        isNull:
          path: spec.template.spec.tolerations

  - it: should inject NODE_NAME from downward API
    asserts:
      - documentIndex: 3
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName

  - it: should restrict to GPU nodes via nodeSelector
    asserts:
      - documentIndex: 3
        equal:
          path: spec.template.spec.nodeSelector["karpenter.k8s.aws/instance-gpu-manufacturer"]
          value: nvidia

  - it: should merge nvidiaDriver.nodeSelector with nodeReadiness.nodeSelector
    set:
      nvidiaDriver:
        nodeSelector:
          custom-label: foo
    asserts:
      - documentIndex: 3
        equal:
          path: spec.template.spec.nodeSelector["karpenter.k8s.aws/instance-gpu-manufacturer"]
          value: nvidia
      - documentIndex: 3
        equal:
          path: spec.template.spec.nodeSelector["custom-label"]
          value: foo

  - it: should use serviceAccount
    asserts:
      - documentIndex: 3
        equal:
          path: spec.template.spec.serviceAccountName
          value: nvidia-gpu-node-ready

  - it: should use custom name for all resources
    set:
      nodeReadiness:
        name: custom-gpu-ready
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.name
          value: custom-gpu-ready
      - documentIndex: 1
        equal:
          path: metadata.name
          value: custom-gpu-ready
      - documentIndex: 2
        equal:
          path: metadata.name
          value: custom-gpu-ready
      - documentIndex: 3
        equal:
          path: metadata.name
          value: custom-gpu-ready

  - it: should use nvidiaDriver namespace
    set:
      nvidiaDriver:
        namespace: gpu-system
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.namespace
          value: gpu-system
      - documentIndex: 2
        equal:
          path: subjects[0].namespace
          value: gpu-system
      - documentIndex: 3
        equal:
          path: metadata.namespace
          value: gpu-system

  - it: should set resource limits and requests
    asserts:
      - documentIndex: 3
        equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 100m
      - documentIndex: 3
        equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 10m
