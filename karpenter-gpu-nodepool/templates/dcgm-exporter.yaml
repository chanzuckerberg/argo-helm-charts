{{- if eq (include "karpenter-gpu-nodepool.dcgmExporter.enabled" . | trim) "true" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.dcgmExporter.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    {{- include "karpenter-gpu-nodepool.dcgm.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  updateStrategy:
    {{- toYaml .Values.dcgmExporter.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        app: nvidia-dcgm-exporter
    spec:
      automountServiceAccountToken: false
      {{- with .Values.nvidiaDriver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $dcgmNodeSel := .Values.dcgmExporter.nodeSelector | default dict }}
      {{- $nvidiaNodeSel := .Values.nvidiaDriver.nodeSelector | default dict }}
      {{- $nodeSel := merge (dict) $nvidiaNodeSel $dcgmNodeSel }}
      {{- with $nodeSel }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nvidiaDriver.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.nvidiaDriver.priorityClassName .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.nvidiaDriver.priorityClassName | default .Values.priorityClass.name }}
      {{- end }}
      containers:
        - name: dcgm-exporter
          image: "{{ .Values.dcgmExporter.image.repository }}:{{ .Values.dcgmExporter.image.tag }}"
          imagePullPolicy: {{ .Values.dcgmExporter.image.pullPolicy }}
          ports:
            - name: gpu-metrics
              containerPort: {{ .Values.dcgmExporter.listenPort }}
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":{{ .Values.dcgmExporter.listenPort }}"
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            {{- toYaml .Values.dcgmExporter.securityContext | nindent 12 }}
          volumeMounts:
            {{- toYaml .Values.dcgmExporter.volumeMounts | nindent 12 }}
          {{- with .Values.dcgmExporter.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- toYaml .Values.dcgmExporter.volumes | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.dcgmExporter.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    app: nvidia-dcgm-exporter
spec:
  type: ClusterIP
  selector:
    app: nvidia-dcgm-exporter
  ports:
    - name: gpu-metrics
      port: {{ .Values.dcgmExporter.listenPort }}
      targetPort: gpu-metrics
{{- end }}
