{{- if .Values.nodeReadiness.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.nodeReadiness.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.nodeReadiness.name }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.nodeReadiness.name }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nodeReadiness.name }}
    namespace: {{ .Values.nvidiaDriver.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.nodeReadiness.name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.nodeReadiness.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.nodeReadiness.name }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Values.nodeReadiness.name }}
    spec:
      serviceAccountName: {{ .Values.nodeReadiness.name }}
      {{- with .Values.nvidiaDriver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $nodeReadinessSel := .Values.nodeReadiness.nodeSelector | default dict }}
      {{- $nvidiaNodeSel := .Values.nvidiaDriver.nodeSelector | default dict }}
      {{- $nodeSel := merge (dict) $nvidiaNodeSel $nodeReadinessSel }}
      {{- with $nodeSel }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wait-and-untaint
          image: "{{ .Values.nodeReadiness.image.repository }}:{{ .Values.nodeReadiness.image.tag }}"
          imagePullPolicy: {{ .Values.nodeReadiness.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Ensuring startup taint {{ .Values.nodeReadiness.startupTaintKey }}:NoSchedule is present on $NODE_NAME"
              kubectl taint node "$NODE_NAME" {{ .Values.nodeReadiness.startupTaintKey }}:NoSchedule --overwrite
              STABLE=0
              while [ "$STABLE" -lt 3 ]; do
                if [ -n "$(kubectl get node "$NODE_NAME" -o jsonpath='{.status.allocatable.nvidia\.com/gpu}')" ]; then
                  STABLE=$((STABLE + 1))
                  echo "GPU healthy check $STABLE/3 on $NODE_NAME..."
                else
                  STABLE=0
                  echo "Waiting for nvidia.com/gpu to appear in node allocatable resources..."
                fi
                sleep 5
              done
              echo "GPUs stable on $NODE_NAME, removing startup taint {{ .Values.nodeReadiness.startupTaintKey }}"
              kubectl taint node "$NODE_NAME" {{ .Values.nodeReadiness.startupTaintKey }}:NoSchedule- || true
              sleep infinity
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.nodeReadiness.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
