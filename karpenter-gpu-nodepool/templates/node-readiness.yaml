{{- if .Values.nodeReadiness.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.nodeReadiness.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.nodeReadiness.name }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.nodeReadiness.name }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nodeReadiness.name }}
    namespace: {{ .Values.nvidiaDriver.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.nodeReadiness.name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.nodeReadiness.name }}
  namespace: {{ .Values.nvidiaDriver.namespace }}
  labels:
    {{- include "karpenter-gpu-nodepool.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.nodeReadiness.name }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Values.nodeReadiness.name }}
    spec:
      serviceAccountName: {{ .Values.nodeReadiness.name }}
      {{- with .Values.nvidiaDriver.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $nodeReadinessSel := .Values.nodeReadiness.nodeSelector | default dict }}
      {{- $nvidiaNodeSel := .Values.nvidiaDriver.nodeSelector | default dict }}
      {{- $nodeSel := merge (dict) $nvidiaNodeSel $nodeReadinessSel }}
      {{- with $nodeSel }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-gpu
          image: "{{ .Values.nodeReadiness.image.repository }}:{{ .Values.nodeReadiness.image.tag }}"
          imagePullPolicy: {{ .Values.nodeReadiness.image.pullPolicy }}
          command:
            - kubectl
            - wait
            - 'node/$(NODE_NAME)'
            - '--for=jsonpath={.status.allocatable.nvidia\.com/gpu}'
            - --timeout=30m
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.nodeReadiness.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: remove-startup-taint
          image: "{{ .Values.nodeReadiness.image.repository }}:{{ .Values.nodeReadiness.image.tag }}"
          imagePullPolicy: {{ .Values.nodeReadiness.image.pullPolicy }}
          command:
            - kubectl
            - patch
            - node
            - $(NODE_NAME)
            - --type=strategic
            - -p
            - '{"spec":{"taints":[{"key":"{{ .Values.nodeReadiness.startupTaintKey }}","effect":"NoSchedule","$patch":"delete"}]}}'
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.nodeReadiness.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
        - name: idle
          image: "{{ .Values.nodeReadiness.image.repository }}:{{ .Values.nodeReadiness.image.tag }}"
          imagePullPolicy: {{ .Values.nodeReadiness.image.pullPolicy }}
          command:
            - kubectl
            - wait
            - --for=delete
            - 'node/$(NODE_NAME)'
            - --timeout=96h
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.nodeReadiness.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
