      - matchRegex:
          path: data["config.alloy"]
          pattern: 'forward_to = \[prometheus\.relabel\.filter_metrics\.receiver\]'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '__address__\s*=\s*"127\.0\.0\.1:9999"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'replacement   = "monitoring"'

  - it: should not render self_remote_write when scrapeSelfRemoteWriteMetrics is disabled
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: true
      prometheusRemoteWrite:
        enabled: true
        scrapeSelfRemoteWriteMetrics:
          enabled: false
