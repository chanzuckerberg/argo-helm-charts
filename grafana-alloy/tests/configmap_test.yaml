  - it: should use prometheusRemoteWrite scrape defaults when additionalStaticScrape omits interval timeout and metricsPath
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: true
      prometheusRemoteWrite:
        enabled: true
        scrapeEndpoints:
          enabled: false
        scrapeSelfRemoteWriteMetrics:
          enabled: false
        scrapeInterval: 45s
        scrapeTimeout: 9s
        additionalStaticScrapes:
          - jobName: defaults-job
            targets:
              - address: 10.0.0.1:9090
        endpoints:
          - url: http://prometheus.svc/api/v1/write
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'prometheus\.scrape "additional_static_0" \{[\s\S]*?scrape_interval = "45s"[\s\S]*?scrape_timeout  = "9s"[\s\S]*?metrics_path    = "/metrics"'

  - it: should render additional_static_1 and per-target job overriding jobName
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: true
      prometheusRemoteWrite:
        enabled: true
        scrapeEndpoints:
          enabled: false
        scrapeSelfRemoteWriteMetrics:
          enabled: false
        additionalStaticScrapes:
          - jobName: first-job
            targets:
              - address: first:9090
          - jobName: ignored-for-second
            targets:
              - address: second:9090
                job: per-target-job
        endpoints:
          - url: http://prometheus.svc/api/v1/write
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'prometheus\.scrape "additional_static_0"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'prometheus\.scrape "additional_static_1"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"__address__"\s*=\s*"first:9090"[\s\S]*?"job"\s*=\s*"first-job"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"__address__"\s*=\s*"second:9090"[\s\S]*?"job"\s*=\s*"per-target-job"'

  - it: should render multiple targets in one additional_static scrape
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: true
      prometheusRemoteWrite:
        enabled: true
        scrapeEndpoints:
          enabled: false
        scrapeSelfRemoteWriteMetrics:
          enabled: false
        additionalStaticScrapes:
          - jobName: multi
            targets:
              - address: a.metrics.svc:8080
              - address: b.metrics.svc:8080
                job: b-override
        endpoints:
          - url: http://prometheus.svc/api/v1/write
    asserts:
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"__address__"\s*=\s*"a\.metrics\.svc:8080"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"__address__"\s*=\s*"b\.metrics\.svc:8080"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"job"\s*=\s*"multi"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"job"\s*=\s*"b-override"'

  - it: should render self_remote_write scrape when scrapeSelfRemoteWriteMetrics is enabled
    set:
      enabled: true
