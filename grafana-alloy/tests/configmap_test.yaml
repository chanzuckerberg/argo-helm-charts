          path: data["config.alloy"]
          pattern: 'prometheus\.scrape "additional_static_0"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"__address__"\s*=\s*"svc\.ns\.svc\.cluster\.local:9090"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"job"\s*=\s*"sonar-test"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: '"namespace"\s*=\s*"ns"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'scrape_interval = "2m"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'scrape_timeout  = "20s"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'metrics_path    = "/custom/metrics"'
      - matchRegex:
          path: data["config.alloy"]
          pattern: 'forward_to      = \[prometheus\.relabel\.filter_metrics\.receiver\]'

  - it: should not render additional_static scrapes when prometheusRemoteWrite is disabled
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: true
      prometheusRemoteWrite:
        enabled: false
        scrapeSelfRemoteWriteMetrics:
          enabled: false
        additionalStaticScrapes:
          - jobName: ghost
            targets:
              - address: ghost:9090
        endpoints: []
    asserts:
      - notMatchRegex:
          path: data["config.alloy"]
          pattern: 'prometheus\.scrape "additional_static_'

  - it: should not render additional_static scrapes when metrics are disabled
    set:
      enabled: true
      clusterName: test-cluster
      alloyConfig:
        metrics:
          enabled: false
      prometheusRemoteWrite:
        enabled: true
        scrapeEndpoints:
          enabled: false
