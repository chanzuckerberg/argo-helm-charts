{{ if .Values.enabled }}
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: {{ .Values.grafanaName }}
  labels:
    app: grafana
    name: {{ .Values.grafanaName }}
  annotations:
    {{- if .Values.grafanaAnnotations }}
    {{- toYaml .Values.grafanaAnnotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.serviceAccount.annotations }}
  serviceAccount:
    metadata:
      annotations: 
        {{- toYaml .Values.serviceAccount.annotations | nindent 8 }}
  {{- end }}
  config:
    log:
      mode: console
      level: debug
    users:
      viewers_can_edit: "true"
    auth:
      disable_login_form: {{ eq .Values.accessMode "sso" | quote }}
    auth.basic:
      enabled: "true"
    auth.anonymous:
      enabled: {{ eq .Values.accessMode "anonymous" | quote }}
      {{- if eq .Values.accessMode "anonymous" }}
      org_role: "Viewer"
      {{- end }}
    {{- if eq .Values.accessMode "sso" }}
    auth.okta:
      enabled: "true"
      name: Okta
      icon: okta
      allow_sign_up: "true"
      scopes: "openid profile email groups"
      auth_url: https://czi-prod.okta.com/oauth2/v1/authorize
      token_url: https://czi-prod.okta.com/oauth2/v1/token
      api_url: https://czi-prod.okta.com/oauth2/v1/userinfo
      client_id: $__file{/etc/secrets/client-id}
      client_secret: $__file{/etc/secrets/client-secret}
      role_attribute_path: {{ .Values.roleAttributePath | quote }}
    {{- end }}
    server:
      root_url: "https://{{ .Values.grafanaSubdomain }}.{{ .Values.baseDomain }}"
    security:
      allow_embedding: {{ .Values.allow_embedding | default "false" | quote }}
  deployment:
    spec:
      replicas: {{ .Values.replicas }}
      template:
        spec:
          {{- $hasSso := eq .Values.accessMode "sso" }}
          {{- $hasExtra := gt (len .Values.extraSecretVolumes) 0 }}
          {{- if and (not $hasSso) (not $hasExtra) }}
          volumes: []
          {{- else }}
          volumes:
            {{- if $hasSso }}
            - name: secrets
              secret:
                secretName: {{ .Values.grafanaName }}-sso-secret
                defaultMode: 0444
            {{- end }}
            {{- if $hasExtra }}
            {{- toYaml .Values.extraSecretVolumes | nindent 12 }}
            {{- end }}
          {{- end }}
          containers:
            - name: grafana
              image: {{ .Values.grafanaBaseImage }}
              {{- if gt (len .Values.env) 0 }}
              env:
                {{- range $key, $value := .Values.env }}
                - name: {{ $key | quote }}
                  value: {{ $value | quote }}
                {{- end }}
              {{- end }}
              {{- if and (not $hasSso) (not $hasExtra) }}
              volumeMounts: []
              {{- else }}
              volumeMounts:
                {{- if $hasSso }}
                - name: secrets
                  mountPath: /etc/secrets
                  readOnly: true
                {{- end }}
                {{- range $extraVolume := .Values.extraSecretVolumes }}
                - name: {{ $extraVolume.name }}
                  mountPath: {{ printf "/etc/%s" $extraVolume.name }}
                  readOnly: true
                {{- end }}
              {{- end }}
  service:
    spec:
      ports:
        - name: http
          port: 80
          targetPort: 3000
  {{- if ne .Values.accessMode "anonymous" }}
  ingress:
    spec:
      ingressClassName: nginx
      rules:
        - host: "{{ .Values.grafanaSubdomain }}.{{ .Values.baseDomain }}"
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ .Values.grafanaName }}-service
                    port:
                      number: 80
      tls:
        - hosts:
            - "{{ .Values.grafanaSubdomain }}.{{ .Values.baseDomain }}"
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/exclude: "false"
        external-dns.alpha.kubernetes.io/target: access.{{ .Values.baseDomain }}
        infra: "true"
        nginx.ingress.kubernetes.io/affinity: cookie
        nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
        nginx.ingress.kubernetes.io/session-cookie-max-age: "600"
        nginx.ingress.kubernetes.io/session-cookie-name: grafana_sticky_session
  {{- end }}
{{ end }}